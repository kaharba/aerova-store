<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>المنتج | Aerova</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="header"><div class="wrap head"><a class="logo" href="/"><img src="/logo.svg" alt="Aerova"></a><div class="search"><input placeholder="ابحث من الصفحة الرئيسية" onclick="location.href='/'"><button onclick="location.href='/'">⌕</button></div><div class="actions"><button class="iconBtn" data-cart>السلة <span class="cartCount">0</span></button></div></div></header>
<main class="wrap productPage" id="productPage"></main>
<div class="drawer" id="drawer"><div class="shade" data-close-cart></div><aside class="cartPanel"><div class="cartHead"><b>سلة المشتريات</b><button class="iconBtn" data-close-cart>×</button></div><div class="cartItems" id="cartItems"></div><div class="cartFoot"><div class="total"><span>الإجمالي</span><span id="cartTotal">0 جنيه</span></div><a class="btn dark" style="display:block;text-align:center" href="/checkout">إتمام الطلب</a></div></aside></div>
<script src="/app.js"></script></body></html>
