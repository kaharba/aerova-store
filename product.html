<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>تفاصيل المنتج | Aerova</title>
  <link rel="icon" href="/logo.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="topbar simple">
    <a class="brand" href="/"><img src="/logo.svg" alt="Aerova"></a>
    <a class="back-link" href="/">كل المنتجات</a>
    <button class="cart-btn" id="openCart">السلة <b id="cartCount">0</b></button>
  </header>

  <main class="product-main" id="productRoot"></main>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-panel">
      <div class="cart-head"><h2>السلة</h2><button id="closeCart" type="button">×</button></div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-total"><span>الإجمالي</span><b id="cartTotal">0 جنيه</b></div>
      <a class="checkout-btn" href="/checkout">إتمام الطلب</a>
    </div>
  </aside>

  <script src="/product.js" defer></script>
</body>
</html>
