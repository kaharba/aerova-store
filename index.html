<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Aerova Egypt | متجر منتجات مختارة</title>
  <meta name="description" content="Aerova Egypt - متجر منتجات مختارة للبيت والمكتب والسفر والاستخدام اليومي." />
  <link rel="icon" href="/logo.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-main">
      <a class="brand" href="/" aria-label="Aerova Egypt">
        <img src="/logo.png" alt="Aerova">
        <span>AEROVA</span>
      </a>
      <button class="cart-pill" id="openCart" type="button" aria-label="فتح السلة">
        <span>السلة</span><b id="cartCount">0</b>
      </button>
    </div>

    <div class="search-line">
      <input id="productSearch" type="search" placeholder="دور على منتج..." autocomplete="off" />
      <select id="sortProducts" aria-label="ترتيب المنتجات">
        <option value="default">الأحدث</option>
        <option value="low">الأرخص</option>
        <option value="high">الأغلى</option>
      </select>
    </div>
  </header>

  <main>
    <section class="hero-mini">
      <div>
        <span>منتجات مختارة</span>
        <h1>كل يوم اختيارات جديدة بسعر مناسب.</h1>
        <p>اطلب من الموقع — الدفع عند الاستلام.</p>
      </div>
      <img src="/cover.png" alt="Aerova products">
    </section>

    <section class="service-row" aria-label="خدمات المتجر">
      <div>🚚 شحن متاح</div>
      <div>💵 دفع عند الاستلام</div>
      <div>☎️ تأكيد قبل الشحن</div>
    </section>

    <nav class="cat-row" id="categoryRow" aria-label="الأقسام"></nav>

    <section class="deal-banner">
      <b>عروض مختارة</b>
      <span>منتجات عملية للبيت والمكتب والسفر</span>
    </section>

    <section class="section-title">
      <h2>المنتجات</h2>
      <span id="resultCount">0 منتج</span>
    </section>

    <section class="products-grid" id="productsGrid"></section>
  </main>

  <aside class="cart-drawer" id="cartDrawer" aria-label="سلة المشتريات">
    <div class="cart-head">
      <h3>السلة</h3>
      <button id="closeCart" aria-label="إغلاق">×</button>
    </div>
    <div id="cartItems" class="cart-items"></div>
    <div class="cart-total"><span>الإجمالي</span><b id="cartTotal">0 جنيه</b></div>
    <a class="main-btn full" href="/checkout">إتمام الطلب</a>
  </aside>
  <div class="overlay" id="overlay"></div>

  <footer class="footer-simple">Aerova Egypt © منتجات مختارة</footer>
  <script src="/app.js"></script>
</body>
</html>
