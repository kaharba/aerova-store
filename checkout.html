<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>إتمام الطلب | Aerova Egypt</title>
  <link rel="icon" href="/logo.png" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="site-header compact"><div class="header-main"><a class="brand" href="/"><img src="/logo.png" alt=""><span>AEROVA</span></a></div></header>
  <main class="checkout-page">
    <a class="back-link" href="/">← رجوع للمتجر</a>
    <h1>إتمام الطلب</h1>
    <div class="checkout-layout">
      <section class="checkout-panel">
        <h2>بيانات التوصيل</h2>
        <form id="checkoutForm" class="form-grid">
          <input name="name" placeholder="الاسم" required>
          <input name="phone" placeholder="رقم الموبايل" inputmode="tel" required>
          <input name="altPhone" placeholder="رقم إضافي اختياري" inputmode="tel">
          <input name="governorate" placeholder="المحافظة" required>
          <input name="city" placeholder="المدينة / المنطقة" required>
          <textarea name="address" placeholder="العنوان بالتفصيل" required></textarea>
          <textarea name="notes" placeholder="ملاحظات اختياري"></textarea>
          <button class="main-btn full" type="submit">تأكيد الطلب</button>
          <p id="formMsg" class="form-msg"></p>
        </form>
      </section>
      <aside class="checkout-panel order-box">
        <h2>ملخص السلة</h2>
        <div id="checkoutItems"></div>
        <div id="checkoutTotals"></div>
      </aside>
    </div>
  </main>
  <script src="/checkout.js"></script>
</body>
</html>
