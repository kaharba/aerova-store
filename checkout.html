<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إتمام الطلب | Aerova</title><link rel="stylesheet" href="/styles.css"></head><body>
<header class="header"><div class="wrap head"><a class="logo" href="/"><img src="/logo.svg" alt="Aerova"></a><div></div><div class="actions"><button class="iconBtn" data-cart>السلة <span class="cartCount">0</span></button></div></div></header>
<main class="wrap checkout" id="checkoutPage"><section class="box"><h2>بيانات التوصيل</h2><form class="form" id="orderForm"><div class="field"><label>الاسم</label><input name="name" required></div><div class="field"><label>رقم الموبايل</label><input name="phone" required inputmode="tel"></div><div class="field"><label>المحافظة / المدينة</label><input name="city" required></div><div class="field"><label>العنوان بالتفصيل</label><textarea name="address" required></textarea></div><div class="field"><label>ملاحظات</label><textarea name="notes"></textarea></div><div class="notice">الدفع عند الاستلام، وهنأكد الطلب معاك قبل الشحن.</div><button class="btn dark" id="submitOrder">تأكيد الطلب</button></form></section><aside class="box"><h2>ملخص الطلب</h2><div id="orderSummary"></div></aside></main>
<div class="drawer" id="drawer"><div class="shade" data-close-cart></div><aside class="cartPanel"><div class="cartHead"><b>سلة المشتريات</b><button class="iconBtn" data-close-cart>×</button></div><div class="cartItems" id="cartItems"></div><div class="cartFoot"><div class="total"><span>الإجمالي</span><span id="cartTotal">0 جنيه</span></div></div></aside></div>
<script src="/app.js"></script></body></html>
