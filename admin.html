<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aerova Admin</title><link rel="stylesheet" href="/styles.css"></head><body class="adminPage">
<section class="login" id="login"><div class="loginBox"><img src="/logo.svg" alt="Aerova" style="width:150px"><h2>لوحة التحكم</h2><div class="field"><label>كلمة المرور</label><input id="pass" type="password"></div><button class="btn dark" onclick="login()" style="width:100%;margin-top:12px">دخول</button><p id="err" class="small" style="color:#d84b4b"></p></div></section>
<section class="adminShell hide" id="admin"><div class="adminTop"><h1>Aerova Admin</h1><a class="btn ghost" href="/">فتح المتجر</a></div><div class="adminGrid"><form class="box form" onsubmit="saveProduct(event)"><h2>إضافة / تعديل منتج</h2><input name="id" placeholder="ID مثل p-200"><input name="name" placeholder="اسم المنتج" required><input name="category" placeholder="القسم" required><input name="price" placeholder="السعر" type="number" required><input name="oldPrice" placeholder="السعر القديم" type="number"><input name="stock" placeholder="المخزون" type="number"><input name="image" placeholder="رابط الصورة /image.svg"><input name="badge" placeholder="بادج"><input name="rating" placeholder="التقييم" type="number" step="0.1"><textarea name="description" placeholder="الوصف"></textarea><textarea name="features" placeholder="كل ميزة في سطر"></textarea><button class="btn dark">حفظ المنتج</button></form><div><div class="box"><h2>المنتجات</h2><div class="adminList" id="productsList"></div></div><div class="box" style="margin-top:14px"><h2>الطلبات</h2><div class="adminList" id="ordersList"></div></div></div></div></section><script src="/admin.js"></script></body></html>
