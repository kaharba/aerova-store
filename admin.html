<!doctype html>
<html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Aerova Admin</title><link rel="stylesheet" href="/styles.css"></head>
<body>
  <main class="admin-page">
    <section class="admin-login" id="loginBox">
      <h1>Aerova Admin</h1>
      <p class="muted">دخول آمن لإدارة المنتجات والطلبات.</p>
      <form id="loginForm" class="form-grid">
        <label class="full">Password<input type="password" id="adminPassword" required></label>
        <button class="place-order" type="submit">دخول</button>
      </form>
    </section>
    <section class="admin-panel" id="adminPanel" hidden>
      <div class="admin-toolbar"><h1>لوحة التحكم</h1><button id="logoutBtn">خروج</button></div>
      <div class="admin-grid">
        <form class="admin-form" id="productForm">
          <h3>إضافة / تعديل منتج</h3>
          <input name="id" placeholder="Product ID - يتولد تلقائي لو فاضي">
          <input name="name" required placeholder="اسم المنتج">
          <input name="category" required placeholder="القسم">
          <input name="price" required type="number" placeholder="السعر">
          <input name="oldPrice" type="number" placeholder="السعر قبل الخصم">
          <input name="stock" type="number" placeholder="المخزون">
          <input name="image" placeholder="رابط الصورة مثل /desk-stand.svg">
          <input name="badge" placeholder="Badge مثل Deal">
          <input name="rating" type="number" step="0.1" placeholder="التقييم">
          <input name="reviews" type="number" placeholder="عدد التقييمات">
          <input name="short" placeholder="وصف قصير للكارت">
          <textarea name="description" placeholder="وصف صفحة المنتج"></textarea>
          <textarea name="features" placeholder="المميزات - كل ميزة في سطر"></textarea>
          <input type="file" id="imageUpload" accept="image/*">
          <button type="submit">حفظ المنتج</button>
          <button type="button" id="clearForm">تفريغ</button>
        </form>
        <div>
          <h3>المنتجات</h3><div class="admin-list" id="productsList"></div>
          <h3>الطلبات</h3><div class="admin-list" id="ordersList"></div>
        </div>
      </div>
    </section>
  </main>
<script src="/admin.js" defer></script>
</body></html>
